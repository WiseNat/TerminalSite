<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_SITE_TITLE%</title>

    <!--Favicons-->
    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />

    <!--CSS Stylesheets-->
    <link rel="stylesheet" href="/styles/main.css" />

    <!-- Primary Meta -->
    <meta name="title" content="%VITE_SITE_TITLE%" />
    <meta name="description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="author" content="Nathan Wise" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%" />
    <meta property="og:title" content="%VITE_SITE_TITLE%" />
    <meta property="og:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_SITE_IMAGE%" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="628" />
    <meta property="og:image:alt" content="%VITE_SITE_IMAGE_ALT%" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_SITE_TITLE%" />
    <meta name="twitter:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_SITE_IMAGE%" />
    <meta name="twitter:image:alt" content="%VITE_SITE_IMAGE_ALT%" />
  </head>
  <body>
    <header role="banner"></header>
    <nav role="navigation"></nav>
    <main role="main">
      <div id="output"></div>
      <div id="command-line-container">
        <div id="prompt"></div>
        <div
          id="input"
          contenteditable="plaintext-only"
          spellcheck="false"
          autofocus
        ></div>
      </div>
    </main>
    <footer role="contentinfo"></footer>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/css_reset.ts"></script>
  </body>
</html>
